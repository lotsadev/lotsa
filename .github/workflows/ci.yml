name: CI

on:
  push:
    branches:
      - main
      - "lotsa/**"
  pull_request:

# Lotsa pushes/rebases a task branch repeatedly during a task; without this
# block each push would stack a redundant run. Group on the ref and cancel any
# in-progress run for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python package + dev deps
        run: pip install -e ".[dev]"

      - name: Build dashboard bundle
        working-directory: lotsa/frontend
        run: npm ci && npm run build

      # Frontend lint/typecheck currently have a pre-existing backlog (e.g.
      # react-hooks/set-state-in-effect in use-mobile, a TaskDetail optional
      # mismatch in stage-bar.test.tsx). Run them for visibility but don't fail
      # the build until the baseline is cleaned up in a dedicated PR — otherwise
      # every task branch goes red on errors it didn't introduce. `npm run test`
      # (vitest) is clean, so it stays a hard gate.
      - name: Lint (frontend)
        working-directory: lotsa/frontend
        run: npm run lint
        continue-on-error: true

      - name: Type check (frontend)
        working-directory: lotsa/frontend
        run: npm run typecheck
        continue-on-error: true

      - name: Test (frontend)
        working-directory: lotsa/frontend
        run: npm run test

      - name: Configure git identity (some tests create commits)
        run: |
          git config --global user.email "ci@lotsa.dev"
          git config --global user.name "Lotsa CI"

      - name: Lint (Python)
        run: |
          ruff check .
          ruff format --check .

      # mypy has a large pre-existing error baseline (~83 errors across the
      # tree, the bulk in modules untouched here). Run it for visibility but
      # don't fail the build until the baseline is driven to zero in a dedicated
      # cleanup PR — a required gate that's red on day one blocks every task
      # branch and trains everyone to ignore it. Flip to a hard gate once clean.
      - name: Type check (mypy)
        run: mypy lotsa/ rigg/
        continue-on-error: true

      - name: Test (Python)
        run: pytest lotsa/tests rigg/tests
