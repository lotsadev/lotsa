name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python package + dev deps
        run: pip install -e ".[dev]"

      - name: Build dashboard bundle
        working-directory: lotsa/frontend
        run: npm ci && npm run build

      - name: Configure git identity (some tests create commits)
        run: |
          git config --global user.email "ci@lotsa.dev"
          git config --global user.name "Lotsa CI"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Test
        run: pytest lotsa/tests rigg/tests
