name: CI

on:
  push:
    branches:
      - main
      - "lotsa/**"
  pull_request:

# Lotsa pushes/rebases a task branch repeatedly during a task; without this
# block each push would stack a redundant run. Group on the ref and cancel any
# in-progress run for the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python package + dev deps
        run: pip install -e ".[dev]"

      - name: Build dashboard bundle
        working-directory: lotsa/frontend
        run: npm ci && npm run build

      - name: Lint (frontend)
        working-directory: lotsa/frontend
        run: npm run lint

      - name: Type check (frontend)
        working-directory: lotsa/frontend
        run: npm run typecheck

      - name: Test (frontend)
        working-directory: lotsa/frontend
        run: npm run test

      - name: Configure git identity (some tests create commits)
        run: |
          git config --global user.email "ci@lotsa.dev"
          git config --global user.name "Lotsa CI"

      - name: Lint (Python)
        run: |
          ruff check .
          ruff format --check .

      - name: Type check (mypy)
        run: mypy lotsa/ rigg/

      - name: Test (Python)
        run: pytest lotsa/tests rigg/tests
