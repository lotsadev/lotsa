name: Claude Code Review

# Automated AI code review on every pull request, checking the diff against the
# project's own rules in CONSTITUTION.md and the per-directory CLAUDE.md files.
# The review body is loaded from the `review-pr` skill so local `/review-pr` and
# CI share a single source of truth.
#
# Setup required (one-time, by a maintainer):
#   1. Install the Claude GitHub App: https://github.com/apps/claude
#   2. Add a CLAUDE_CODE_OAUTH_TOKEN repository secret — generate it locally with
#      `claude setup-token` (or swap the input below for an ANTHROPIC_API_KEY).
#      Settings → Secrets and variables → Actions.
# The `if:` guard below restricts the job to same-repo PRs, so fork PRs (which
# never receive secrets) don't trip a failing required check.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Load review-pr skill prompt
        id: skill
        # Read .claude/skills/review-pr/SKILL.md into a step output so the next
        # step can pass it as the prompt. claude-code-action@v1 has no
        # skill-loading input, so we inline the skill body at workflow time —
        # single source of truth between local `/review-pr` and CI.
        #
        # The awk script strips the YAML frontmatter (the ``---`` block carries
        # skill metadata the action doesn't need). If the file has no
        # frontmatter, awk falls through and prints everything.
        run: |
          {
            echo 'PROMPT<<SKILLEOF'
            awk 'BEGIN{n=0; seen=0} /^---$/{n++; seen=1; next} seen && n<2{next} {print}' .claude/skills/review-pr/SKILL.md
            echo 'SKILLEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.skill.outputs.PROMPT }}
          use_sticky_comment: true
          track_progress: true
          # Tool allow-list lives here (not in SKILL.md's ``allowed-tools``
          # frontmatter) because the action enforces tool permissions via
          # claude_args, not via the skill metadata.
          claude_args: '--allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*),Bash(git fetch:*),Read,Glob,Grep"'
