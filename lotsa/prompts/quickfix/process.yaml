process: quickfix
description: |
  Mechanical change the operator has already decided on (status bumps, typo
  fixes, renames, config tweaks, dependency bumps). No design conversation, no
  test writing. The coder executes a precise instruction; review checks the
  diff against that instruction, not the broad architectural checklist.
promotion_inputs:
  - name: instruction
    description: The mechanical change the operator wants applied.
jobs:
  - name: code
    type: agent
    prompt: coding
    posthooks: [commit]

  # Routing lives at the flow-step level below (per-flow overrides take
  # precedence over job defaults — see lotsa/CLAUDE.md). ``review`` runs in
  # the single ``main`` flow, so a job-level ``rules:`` block here would be
  # dead-shadowed; the authoritative routing is under ``flows.main.steps``.
  - name: review
    type: agent
    prompt: review

flows:
  main:
    steps:
      - code
      - name: review
        rules:
          - source: stdout
            pattern: "^REVIEW_PASS"
            target: next
          - source: stdout
            pattern: "^REVIEW_FAIL"
            target: code
