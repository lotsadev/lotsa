process: software_process
description: |
  New feature or substantive change. Full SDLC discipline: operator-approved
  spec, plan, failing-tests-first, code, review, and post-implementation
  verify. Use when the behavior to add is non-trivial and worth the ceremony.
promotion_inputs:
  - name: draft_spec
    description: A discussed-and-agreed spec the operator wants verified rather
                 than re-elicited (e.g. distilled from a chat conversation).
jobs:
  # ADR-022 — per-step model selection. Every step falls back to the global
  # `model:` in lotsa.yaml; add `model: <name>` on a step to override. The
  # bundled process deliberately ships NO per-step models — assigning them
  # is operator policy, and bundled defaults would silently override the
  # operator's global model on upgrade (PR #124 shipped exactly that and an
  # opus operator found spec running on haiku). A cost-tiered example:
  #   spec:        model: haiku    # conversational elicitation is cheap
  #   plan:        model: opus     # deepest reasoning step
  #   test/code:   model: sonnet   # strong coding tier
  #   review:      model: opus     # different model than the implementer —
  #                                # model diversity catches more
  #   pr-fix:      model: sonnet
  #   verify:      model: opus
  - name: spec
    type: agent
    prompt: spec
    conversational: true
    output: spec
    queue_state: speccing
    active_state: spec
    rules:
      - source: stdout
        pattern: "^SPEC_COMPLETE:"
        target: next

  - name: plan
    type: agent
    prompt: planning
    evaluate: true
    inputs: [spec]
    output: plan
    queue_state: backlog
    active_state: planning
    gate_state: planned

  - name: test
    type: agent
    prompt: testing
    resume: true
    inputs: [spec, plan]
    queue_state: testing
    active_state: testing
    posthooks: [commit]

  - name: code
    type: agent
    prompt: coding
    resume: true
    inputs: [spec, plan]
    queue_state: coding
    active_state: coding
    posthooks: [commit]

  - name: review
    type: agent
    prompt: review
    inputs: [spec, plan]
    queue_state: reviewing
    active_state: reviewing
    rules:
      - source: stdout
        pattern: "^REVIEW_PASS"
        target: next
      - source: stdout
        pattern: "^REVIEW_FAIL"
        target: blocked

  - name: pr-fix
    type: agent
    prompt: pr-fix
    resume: true
    inputs: [spec, plan]
    queue_state: pr-fixing
    active_state: pr-fixing
    posthooks: [commit]
    rules:
      - source: stdout
        pattern: "^PR_FIX_DONE:"
        target: review
      - source: stdout
        pattern: "^PR_FIX_NEEDS_DECISION:"
        target: needs_input
      - source: stdout
        pattern: "^PR_FIX_BLOCKED:"
        target: blocked
      - source: stdout
        pattern: "^PR_FIX_SKIPPED:"
        target: wait_for_pr_signal

  - name: verify
    type: agent
    prompt: verify
    conversational: true
    inputs: [spec]
    posthooks: [commit]
    rules:
      - source: stdout
        pattern: "^NEEDS_CODE:"
        target: code
      - source: stdout
        pattern: "^NEEDS_REVIEW:"
        target: review
      - source: stdout
        pattern: "^VERIFIED:"
        target: next

  - name: pr_summary
    type: agent
    prompt: pr_summary
    output: pr_description
    queue_state: summarizing
    active_state: summarizing

  - name: push_pr
    type: action
    tool: push_pr

  - name: resolve_conflicts
    type: agent
    prompt: resolve_conflicts
    resume: true
    queue_state: resolving_conflicts
    active_state: resolving_conflicts
    posthooks: [commit]
    rules:
      - source: stdout
        pattern: "^CONFLICTS_RESOLVED:"
        target: pr-fix

  - name: wait_for_pr_signal
    type: monitor
    engine: pr_monitor
    config:
      poll_interval_seconds: 30
      debounce_seconds: 120
      triggers: [human_comment, bot_comment, review_decision, failing_check, merge_conflict]
      max_pr_fix_rounds: 10
      max_consecutive_skipped: 3

flows:
  main:
    steps:
      - spec
      - plan
      - test
      - code
      - name: review
        rules:
          - source: stdout
            pattern: "^REVIEW_PASS"
            target: next
          - source: stdout
            pattern: "^REVIEW_FAIL"
            target: code
      - verify
      - pr_summary
      - push_pr
      - wait_for_pr_signal

  pr_fix:
    steps:
      - name: pr-fix
        rules:
          - source: stdout
            pattern: "^PR_FIX_DONE:"
            target: review
          - source: stdout
            pattern: "^PR_FIX_NEEDS_DECISION:"
            target: needs_input
          - source: stdout
            pattern: "^PR_FIX_BLOCKED:"
            target: blocked
          - source: stdout
            pattern: "^PR_FIX_SKIPPED:"
            target: wait_for_pr_signal
      - name: resolve_conflicts
        rules:
          - source: stdout
            pattern: "^CONFLICTS_RESOLVED:"
            target: pr-fix
      - name: review
        rules:
          - source: stdout
            pattern: "^REVIEW_PASS"
            target: next
          - source: stdout
            pattern: "^REVIEW_FAIL"
            target: pr-fix
      - push_pr
